<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>flippyCoin</title>
</head>
<body>
    <main>
        <header>
            <h1>Flip the Coin</h1>
            <p>Press de coin or the button for flip the coin</p>
        </header>
        <div class="coin-wrapper">
            <div class="coin">
                <img src="img/tails.svg" alt="Coin">
            </div>
            <img class="shadow" src="img/shadow.svg" alt="Shadow coin">
        </div>
        <footer>
            <p class="result">---</p>
            <button id="flipButton">Flip Coin</button>
        </footer>
       
    </main>
    <script src="script.js"></script>
</body>
</html>
